<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dystopia Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

  <!-- Экран плавной загрузки -->
  <div id="splash" class="splash">
    <div class="splash-mark">
      <div class="splash-ring"></div>
    </div>
    <div class="splash-label">
      <span>Загрузка</span>
      <span class="splash-dots"><i></i><i></i><i></i></span>
    </div>
    <div class="splash-bar"><div class="splash-bar-fill" id="splashBarFill"></div></div>
  </div>

  <div id="app" class="app">

    <div class="bg-glow bg-glow--top"></div>
    <div class="bg-glow bg-glow--bottom"></div>

    <!-- ===== Экран: МАГАЗИН ===== -->
    <section id="view-shop" class="view view--active">
      <header class="topbar">
        <span class="topbar-eyebrow">Каталог</span>
        <h1 class="topbar-title">Магазин</h1>
      </header>

      <div id="productList" class="product-grid">
        <!-- Карточки товаров рендерятся из script.js -->
      </div>
    </section>

    <!-- ===== Экран: ПРОФИЛЬ ===== -->
    <section id="view-profile" class="view">
      <header class="topbar">
        <span class="topbar-eyebrow">Аккаунт</span>
        <h1 class="topbar-title">Профиль</h1>
      </header>

      <div class="profile-card">
        <div class="profile-avatar-wrap">
          <img id="profileAvatar" class="profile-avatar" alt="Аватар" src="" hidden>
          <div id="profileAvatarFallback" class="profile-avatar profile-avatar--fallback">
            <span id="profileAvatarLetter">?</span>
          </div>
        </div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-username" id="profileUsername">@—</div>
      </div>

      <div class="stats-card">
        <div class="stats-row">
          <span class="stats-label">Покупок сделано</span>
          <span class="stats-value" id="profilePurchases">0</span>
        </div>
      </div>
    </section>

    <!-- ===== Экран: ОФОРМЛЕНИЕ ПОКУПКИ ===== -->
    <section id="view-checkout" class="view view--checkout">
      <header class="checkout-topbar">
        <button class="back-btn" id="checkoutBack" type="button" aria-label="Назад">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div>
          <span class="topbar-eyebrow">Оформление</span>
          <h1 class="topbar-title" id="checkoutTitle">—</h1>
        </div>
      </header>

      <div class="checkout-hero">
        <div class="checkout-hero-icon"><span id="checkoutInitial"></span></div>
        <div class="checkout-hero-info">
          <div class="checkout-hero-badges" id="checkoutBadges"></div>
          <p class="checkout-hero-subtitle" id="checkoutSubtitle"></p>
        </div>
      </div>

      <div class="option-group">
        <span class="option-group-label">Срок доступа</span>
        <div class="duration-options" id="checkoutDurations"></div>
      </div>

      <div class="option-group">
        <span class="option-group-label">Промокод</span>
        <div class="promo-row">
          <input type="text" id="checkoutPromoInput" class="promo-input" placeholder="Введите промокод" autocomplete="off" autocapitalize="off" spellcheck="false">
          <button class="promo-apply-btn" id="checkoutPromoApply" type="button">Применить</button>
        </div>
        <p class="promo-status" id="checkoutPromoStatus"></p>
      </div>

      <div class="option-group">
        <span class="option-group-label">Способ оплаты</span>
        <div class="payment-options">
          <div class="payment-option payment-option--selected">
            <svg class="icon-star" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.5l2.9 6.6 7.2.6-5.5 4.7 1.7 7.1-6.3-3.9-6.3 3.9 1.7-7.1-5.5-4.7 7.2-.6z"/></svg>
            <span class="payment-option-label">Telegram Stars</span>
            <span class="payment-option-check">✓</span>
          </div>
        </div>
      </div>

      <button class="buy-btn" id="checkoutBuyBtn">
        <span class="buy-btn-old-price" id="checkoutOldPrice" hidden></span>
        <span class="buy-btn-text" id="checkoutBuyText">Купить</span>
      </button>
      <p class="card-status" id="checkoutStatus"></p>
    </section>

    <!-- ===== Нижняя навигация ===== -->
    <nav class="tabbar">
      <button class="tab tab--active" data-view="shop">
        <span class="tab-icon">◆</span>
        <span class="tab-label">Магазин</span>
      </button>
      <button class="tab" data-view="profile">
        <span class="tab-icon">●</span>
        <span class="tab-label">Профиль</span>
      </button>
    </nav>

  </div>

  <!-- Шаблон карточки товара -->
  <template id="productCardTemplate">
    <article class="card">
      <button class="card-row" type="button">
        <div class="card-row-icon"><span class="card-row-initial"></span></div>
        <div class="card-row-info">
          <h2 class="card-row-title"></h2>
          <div class="card-row-meta">
            <div class="card-row-badges"></div>
            <p class="card-row-subtitle"></p>
          </div>
        </div>
        <div class="card-row-price">
          <svg class="icon-star" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.5l2.9 6.6 7.2.6-5.5 4.7 1.7 7.1-6.3-3.9-6.3 3.9 1.7-7.1-5.5-4.7 7.2-.6z"/></svg>
          <span class="price-value"></span>
        </div>
        <span class="card-row-chevron">›</span>
      </button>
    </article>
  </template>

  <!-- Шаблон опции срока доступа -->
  <template id="durationOptionTemplate">
    <button class="duration-option" type="button">
      <span class="duration-option-label"></span>
      <span class="duration-option-price"></span>
    </button>
  </template>

  <script src="script.js"></script>
</body>
</html>
