<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dystopia</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">

    <div class="glow"></div>

    <main class="card">
      <div class="badge">★ ТОВАР</div>

      <div class="art">
        <div class="art-ring"></div>
        <div class="art-core">D</div>
      </div>

      <h1 class="title">Dystopia</h1>
      <p class="subtitle">Цифровой доступ к закрытой коллекции</p>

      <div class="price-row">
        <span class="price-star">★</span>
        <span class="price-value">150</span>
      </div>

      <button id="buyBtn" class="buy-btn">
        <span id="buyBtnText">Купить за 150 ★</span>
      </button>

      <p id="status" class="status"></p>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
